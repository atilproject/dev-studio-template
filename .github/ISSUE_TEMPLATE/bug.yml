name: Bug Report
description: Hata veya beklenmedik davranış
title: "[Bug] "
labels: ["type:bug", "status:backlog", "agent:developer", "cc:developer"]
body:
  - type: markdown
    attributes:
      value: |
        > **ADR-0012 4-cat invariant:** Bu issue `type:*` + `agent:*` + `status:*` + `cc:*` olmak üzere 4 label kategorisi taşır.
        > - `type:bug` + `agent:developer` + `cc:developer` pre-fill edilmiş (tester veya kullanıcı tarafından report edildikten sonra developer'a devredilir)
        > - `status:backlog` → `status:in-progress` (developer claim edince, ADR-0038 auto-claim)
        > - **Ownership rule (Issue #113):** Labels are the source of truth for current ownership. The owning agent is whoever has `agent:<role>` on this issue. If you (as the bug reporter) are not the owner, the assigned role will pick it up via agent-watch.sh wake events.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Ne oldu? Ne bekliyordun?
      placeholder: "Login butonuna tıklayınca 500 hatası alıyorum"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. /login sayfasına git
        2. Email + şifre gir
        3. Submit'e bas
        4. 500 hatası görülür
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "Başarılı login + dashboard'a yönlendirme"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Critical (prod down)
        - P1 — High (major impact)
        - P2 — Medium (workaround exists)
        - P3 — Low (cosmetic)
      default: 2
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Browser:
        - Version:
        - User role:

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      placeholder: Hata mesajı, stack trace, ekran görüntüsü...
